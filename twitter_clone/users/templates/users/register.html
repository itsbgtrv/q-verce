<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Q-Verse</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: #f9f9f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Используем min-height для длинных форм */
            padding: 20px 0;
        }

        .register-container {
            background: #fff;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px; /* Чуть шире для регистрации */
            text-align: center;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: -1px;
            text-decoration: none;
            color: #000;
            display: inline-block;
        }

        h2 {
            font-size: 28px;
            font-weight: 800;
            margin: 0 0 10px 0;
            letter-spacing: -1px;
        }

        p.subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 15px;
        }

        /* Стилизация формы Django */
        form p {
            text-align: left;
            margin-bottom: 15px;
            color: #1a1a1a;
            font-weight: 500;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            margin-top: 8px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
            font-family: inherit;
        }

        input:focus {
            border-color: #4f87ff;
            box-shadow: 0 0 0 4px rgba(79, 135, 255, 0.1);
        }

        /* Стиль для текста помощи под полями (пароль и т.д.) */
        .helptext {
            display: block;
            font-size: 12px;
            color: #888;
            margin-top: 5px;
            line-height: 1.4;
        }

        ul {
            padding-left: 20px;
            text-align: left;
            font-size: 12px;
            color: #888;
        }

        button {
            width: 100%;
            background-color: #000; /* Регистрацию выделим черным цветом */
            color: white;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }

        button:hover {
            background-color: #333;
            transform: translateY(-2px);
        }

        .footer-text {
            margin-top: 25px;
            font-size: 14px;
            color: #666;
        }

        .footer-text a {
            color: #4f87ff;
            text-decoration: none;
            font-weight: 600;
        }

        .back-link {
            display: block;
            margin-top: 20px;
            color: #aaa;
            text-decoration: none;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <a href="/" class="logo">Q-Verse</a>
        
        <h2>Create an account</h2>
        <p class="subtitle">Join our community of writers and readers</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Get Started</button>
        </form>

        <div class="footer-text">
            Already have an account? <a href="{% url 'login' %}">Sign in</a>
        </div>

        <a href="/" class="back-link">← Cancel and go back</a>
    </div>

</body>
</html>
