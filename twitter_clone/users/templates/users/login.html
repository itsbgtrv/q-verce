<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Q-Verse</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-color: #f9f9f9; /* Светло-серый фон */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background: #fff;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        p.subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 15px;
        }

        /* Стилизация формы Django {{ form.as_p }} */
        form p {
            text-align: left;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            margin-top: 5px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: #4f87ff;
            box-shadow: 0 0 0 4px rgba(79, 135, 255, 0.1);
        }

        button {
            width: 100%;
            background-color: #4f87ff;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 20px;
        }

        button:hover {
            background-color: #3b71e6;
        }

        .back-link {
            display: block;
            margin-top: 20px;
            color: #888;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            color: #000;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div style="font-size: 24px; font-weight: 800; margin-bottom: 20px; letter-spacing: -1px;">Q-Verse</div>
        
        <h2>Welcome back</h2>
        <p class="subtitle">Please enter your details</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Log in</button>
        </form>

        <a href="{% url 'base' %}" class="back-link">← Back to home</a>
    </div>

</body>
</html>
