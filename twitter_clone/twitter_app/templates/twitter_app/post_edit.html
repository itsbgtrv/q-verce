

{% block content %}
    <div style="max-width: 800px; margin: 20px auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
        <h2>Редактировать пост</h2>
        
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" style="background-color: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">
                Сохранить изменения
            </button>
            <a href="{% url 'post_detail' post.id %}" style="margin-left: 15px; color: #666;">Отмена</a>
        </form>
    </div>
{% endblock content %}
